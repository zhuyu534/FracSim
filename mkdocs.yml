# mkdocs.yml
site_name: FracSim
site_description: Fast bacterial genome similarity estimation using FracMinHash sketching
site_author: Yu Zhu
site_url: https://zhuyu534.github.io/FracSim
theme:
  name: material
  logo: images/logo.png   # 导航栏左侧图标
  favicon: images/logo.png # 浏览器标签页图标

repo_name: zhuyu534/FracSim
repo_url: https://github.com/zhuyu534/FracSim

theme:
  name: material
  language: en
  features:
    - navigation.tabs
    - navigation.sections
    - toc.integrate
    - search.suggest
    - search.highlight
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode

markdown_extensions:
  - pymdownx.highlight
  - pymdownx.superfences
  - pymdownx.inlinehilite
  - pymdownx.tabbed
  - admonition
  - footnotes
  - tables

nav:
  - Home: index.md
  - Installation: installation.md
  - Quick Start: quickstart.md
  - Usage: usage.md
  - Algorithms: algorithms.md
  - Contributing: contributing.md
  - Changelog: changelog.md

plugins:
  - search