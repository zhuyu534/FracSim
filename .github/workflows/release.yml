name: Build and Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        include:
          - os: ubuntu-latest
            asset_name: fracsim-linux-amd64
            icon: 🐧
            platform_name: Linux
          - os: windows-latest
            asset_name: fracsim-windows-amd64.exe
            icon: 🪟
            platform_name: Windows
          - os: macos-latest
            asset_name: fracsim-macos-universal2
            icon: 🍎
            platform_name: macOS

    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller mmh3 numpy
          
      # 创建独立入口脚本以解决相对导入问题
      - name: Create entry script
        run: |
          cat > run.py << 'EOF'
          from fracsim.main import main
          if __name__ == '__main__':
              main()
          EOF

      - name: Build with PyInstaller
        run: |
          pyinstaller --onefile --name fracsim ./run.py
          
      - name: Rename binary for upload (cross-platform)
        shell: bash
        run: |
          if [ "${{ runner.os }}" = "Windows" ]; then
            mv dist/fracsim.exe dist/${{ matrix.asset_name }}
          else
            mv dist/fracsim dist/${{ matrix.asset_name }}
          fi
          
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: dist/${{ matrix.asset_name }}
          if-no-files-found: error

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./artifacts
          
      - name: Generate Release Body
        id: body
        run: |
          VERSION=${GITHUB_REF#refs/tags/}
          REPO_NAME="${{ github.event.repository.name }}"
          OWNER="${{ github.repository_owner }}"
          
          # 创建带图标的表格
          cat > release_body.md << EOF
          ## 🎉 FracSim $VERSION
          
          ### 📥 Downloads
          
          |  | Platform | File |
          |--|----------|------|
          | 🐧 | Linux | [fracsim-linux-amd64](${{ github.server_url }}/${{ github.repository }}/releases/download/$VERSION/fracsim-linux-amd64) |
          | 🪟 | Windows | [fracsim-windows-amd64.exe](${{ github.server_url }}/${{ github.repository }}/releases/download/$VERSION/fracsim-windows-amd64.exe) |
          | 🍎 | macOS | [fracsim-macos-universal2](${{ github.server_url }}/${{ github.repository }}/releases/download/$VERSION/fracsim-macos-universal2) |
          
          ### 🔧 Quick Start
          
          **Linux/macOS:**
          \`\`\`bash
          chmod +x fracsim-*
          ./fracsim-* --help
          \`\`\`
          
          **Windows (PowerShell):**
          \`\`\`powershell
          .\fracsim-windows-amd64.exe --help
          \`\`\`
          
          ### 📚 Documentation
          Full documentation: [GitHub Pages](https://$OWNER.github.io/$REPO_NAME/)
          
          ---
          **Full Changelog**: ${{ github.server_url }}/${{ github.repository }}/commits/$VERSION
          EOF
          
      - name: Create Release and Upload Assets
        uses: softprops/action-gh-release@v2
        with:
          files: ./artifacts/**/*
          body_path: release_body.md
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}